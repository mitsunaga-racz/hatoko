name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Cache Mint packages
        uses: actions/cache@v5
        with:
          path: ~/.mint
          key: mint-${{ hashFiles('Mintfile') }}

      - name: Install Mint & tools
        run: |
          brew install mint
          mint bootstrap

      - name: SwiftLint
        run: mint run swiftlint lint --strict

  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Cache Mint packages
        uses: actions/cache@v5
        with:
          path: ~/.mint
          key: mint-${{ hashFiles('Mintfile') }}

      - name: Install Mint & tools
        run: |
          brew install mint
          mint bootstrap

      - name: Generate Xcode project
        run: mint run xcodegen generate

      - name: Build and Test
        run: |
          xcodebuild -project Hatoko.xcodeproj \
            -scheme Hatoko \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            test
