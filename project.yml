name: Hatoko
options:
  bundleIdPrefix: com.chigichan24
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.0"
  groupSortPosition: top

packages:
  ZenzaiConverter:
    path: LocalPackages/ZenzaiConverter

targets:
  Hatoko:
    type: application
    platform: macOS
    sources: [Hatoko]
    dependencies:
      - package: ZenzaiConverter
        product: ZenzaiConverter
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_TREAT_WARNINGS_AS_ERRORS: true
        GCC_TREAT_WARNINGS_AS_ERRORS: true
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        SWIFT_OBJC_INTEROP_MODE: objcxx
        PRODUCT_BUNDLE_IDENTIFIER: com.chigichan24.inputmethod.Hatoko
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Hatoko/Hatoko.entitlements
    preBuildScripts:
      - script: |
          if command -v mint >/dev/null 2>&1; then
            mint run swiftgen config run --config "${SRCROOT}/swiftgen.yml"
          fi
        name: SwiftGen
        outputFiles:
          - $(SRCROOT)/Hatoko/Generated/Strings+Generated.swift
    postBuildScripts:
      - script: |
          cd "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          for lproj in *.lproj; do
            STRINGS="$lproj/InfoPlist.strings"
            [ -f "$STRINGS" ] || continue
            plutil -convert xml1 "$STRINGS"
            if ! grep -q "CFBundleName" "$STRINGS"; then
              sed -i '' 's|</dict>|<key>CFBundleName</key><string>Hatoko</string></dict>|' "$STRINGS"
            fi
            plutil -convert binary1 "$STRINGS"
          done
        name: Inject CFBundleName into InfoPlist.strings
  HatokoTests:
    type: bundle.unit-test
    platform: macOS
    sources: [HatokoTests]
    settings:
      base:
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_TREAT_WARNINGS_AS_ERRORS: true
        GCC_TREAT_WARNINGS_AS_ERRORS: true
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        SWIFT_OBJC_INTEROP_MODE: objcxx
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Hatoko
